<div class="mobile-header" *ngIf="isMobile()">
    <img src="favicon.ico" alt="Logo" class="header-logo">
    <span>БГ-2026 КумКВата</span>
</div>
<div class="map-page-container">
    <p-toast position="top-right" [life]="5000"></p-toast>
    
    <!-- TerraDraw toolbar -->
    <div class="terradraw-toolbar" *ngIf="hasTerraDraw">
        <button (click)="setDrawMode('polygon')" 
                [class.active]="currentDrawMode === 'polygon'"
                [disabled]="!canDraw"
                title="Рисовать полигон">⬡</button>
        <button (click)="setDrawMode('select')" 
                [class.active]="currentDrawMode === 'select'"
                title="Выбрать/редактировать">✋</button>
        <button (click)="deleteSelectedPolygon()" 
                title="Удалить полигон">🗑</button>
    </div>
    
    <div class="filter-column" 
         [class.collapsed]="filterPanelCollapsed"
         [style.width.px]="filterColumnWidth">
        <button *ngIf="!filterPanelCollapsed" pButton type="button" 
                icon="pi pi-angle-left" 
                (click)="toggleFilterPanel()"
                class="p-button-sm p-button-text collapse-panel-btn"></button>
        <div class="resize-handle" 
             *ngIf="!filterPanelCollapsed && !isMobile()"
             (mousedown)="onResizeStart($event)"></div>
        <div class="filter-container" [style.display]="filterPanelCollapsed ? 'none' : 'block'">
            <div *ngIf="lastError" class="alert alert-danger">
                <pre>{{lastError.error}}
{{lastError.description}}</pre>
            </div>

            <p-tabs [value]="activeTabIndex" [style]="{'height': '100%'}">
                <p-tablist>
                    <p-tab [value]="0">Поиск</p-tab>
                    <p-tab [value]="1">Маршрут</p-tab>
                </p-tablist>
                <p-tabpanels>
                    <p-tabpanel [value]="0" [style]="{'height': '100%'}">
                        <div style="height: 100%; display: flex; flex-direction: column;">
                            <div class="filter-controls" style="margin-top: 5px; flex: 0 0 auto;">
                                <span *ngIf="!(mapService.dataLoaded$ | async)" class="p-button-icon pi pi-spin pi-spinner" style="margin-left: 10px;"></span>
                                
                                <input type="text" 
                                       pInputText 
                                       [(ngModel)]="searchString" 
                                       (ngModelChange)="onSearchStringChanged($event)"
                                       placeholder="Запрос по названию"
                                       style="width: 100%" />
                                
                                <p-multiSelect 
                                    [options]="allTypes"
                                    [(ngModel)]="selectedTypes"
                                    placeholder="Нужные типы"
                                    [showClear]="true"
                                    [filter]="true"
                                    (onChange)="typeSelectionChanged()"
                                    [style]="{'width':'100%'}">
                                </p-multiSelect>
                                
                                <p-multiSelect 
                                    [options]="allTypes"
                                    [(ngModel)]="ignoredTypes"
                                    placeholder="Игнорировать типы"
                                    [showClear]="true"
                                    [filter]="true"
                                    (ngModelChange)="ignoredTypeSelectionChanged()"
                                    [style]="{'width':'100%'}">
                                </p-multiSelect>
                                
                                <div class="inline-checkbox">
                                    <p-checkbox [(ngModel)]="useMapBounds" 
                                               (ngModelChange)="onUseMapBoundsChanged()" 
                                               [binary]="true"
                                               inputId="useMapBounds"></p-checkbox>
                                    <label for="useMapBounds">Учитывать границы карты</label>
                                </div>
                                <div class="inline-checkbox">
                                    <p-checkbox [(ngModel)]="useMapPolygon" 
                                               (ngModelChange)="onUseMapPolygonChanged()" 
                                               [binary]="true"
                                               inputId="useMapPolygon"></p-checkbox>
                                    <label for="useMapPolygon">Учитывать фигуру</label>
                                </div>
                                <div class="inline-checkbox">
                                    <p-checkbox [(ngModel)]="showCurrentPosition" 
                                               (ngModelChange)="onShowCurrentPositionChanged()" 
                                               [binary]="true"
                                               inputId="showCurrentPosition"></p-checkbox>
                                    <label for="showCurrentPosition">Показывать где я</label>
                                </div>
                                
                                <div style="margin-top: 5px;">
                                    <button pButton type="button" (click)="onSearchClick()" label="Найти" class="p-button-sm"></button>
                                    <button pButton type="button" (click)="onShowOnMapClick()" label="Показать на карте" class="p-button-sm p-button-outlined"></button>
                                </div>
                            </div>

                            <div class="filter-list" style="height: 100%;">
                                <span style="margin-left: 10px; margin-right: 10px; position: absolute; right: 60px; margin-top: 12px;">
                                    <b>Найдено: {{totalResultsCount > MAX_DISPLAY_ITEMS ? '> ' + MAX_DISPLAY_ITEMS + ' (' + totalResultsCount + ')' : mapData?.length || 0}}</b>
                                </span>
                                <p-listbox [options]="mapData" 
                                           [(ngModel)]="selectedMapData"
                                           optionLabel="name"
                                           [multiple]="true"
                                           [checkbox]="true"
                                           [filter]="false"
                                           [virtualScroll]="true"
                                           [virtualScrollItemSize]="58"
                                           [style]="{'width': '100%', 'height': '100%'}">
                                    <ng-template let-item pTemplate="item">
                                        <div class="map-data-item">
                                            <div class="map-data-name" [title]="item.name">{{item.name}}</div>
                                            <div class="map-data-types" [title]="item.dataTypesTitle">
                                                <span *ngFor="let mapPoints of item.data" class="badge badge-info" [title]="mapPoints.type">{{mapPoints.type}}</span>
                                            </div>
                                        </div>
                                    </ng-template>
                                </p-listbox>
                            </div>
                        </div>
                    </p-tabpanel>

                    <p-tabpanel [value]="1" style="height: 100%; display:flex; flex-direction:column;">
                        <div style="margin-top: 5px; flex:0;">
                            <p-checkbox [(ngModel)]="showRoute" 
                                       (ngModelChange)="redrawRoute()" 
                                       [binary]="true"
                                       inputId="showRoute"></p-checkbox>
                            <label for="showRoute">Показывать маршрут</label>
                             <span *ngIf="saving" class="p-button-icon pi pi-spin pi-spinner" style="margin-left: 10px;"></span>
                             <br/>
                             <button pButton type="button" (click)="onAddRoutePointClick()" label="Добавить" class="p-button-sm" style="margin-left: 10px;"></button>
                             <button pButton type="button" (click)="onDeleteRoutePointsClick()" 
                                     [disabled]="!selectedPoint" 
                                     label="Удалить" class="p-button-sm p-button-danger"></button>
                             <button pButton type="button" (click)="openInYandexMaps()" 
                                     [disabled]="!hasRoutePoints()" 
                                     label="Яндекс" class="p-button-sm p-button-secondary" style="margin-left: 10px;"></button>
                        </div>
                        <div class="route-list-controls" *ngIf="isMobile() && selectedPoint">
                            <button pButton type="button" icon="pi pi-arrow-up" (click)="moveSelectedPointUp()" [disabled]="!selectedPoint" class="p-button-sm p-button-text"></button>
                            <button pButton type="button" icon="pi pi-arrow-down" (click)="moveSelectedPointDown()" [disabled]="!selectedPoint" class="p-button-sm p-button-text"></button>
                        </div>
                        <div class="route-list">
                            <p-orderList 
                                [value]="(routeDataSource | async) || []"
                                optionLabel="name"
                                [dragdrop]="!isMobile()"
                                [controlsPosition]="'right'"
                                [selection]="selectedPoint ? [selectedPoint] : []"
                                (onReorder)="onRouteReorder()">
                                <ng-template let-item pTemplate="item" let-i="index">
                                    <div class="route-list--item" [class.selected]="selectedPoint?.pointId === item.pointId" (click)="selectPoint(item)">
                                        <div class="route-item-fields">
                                            <input type="text"
                                                   style="overflow-wrap: anywhere; white-space: normal; height: 30px"
                                                   [ngModel]="item.name"
                                                   (input)="onInputEvent($event, item)"
                                                   (blur)="onPointFieldBlur(item)"
                                                   (keypress)="onKeyPress($event)"
                                                   class="inline-editor"
                                                   [readonly]="selectedPoint?.pointId !== item.pointId"
                                                   placeholder="Введите название точки"
                                                   autocomplete="off"
                                                   autocorrect="off"
                                                   autocapitalize="off"/>
                                            <textarea
                                                    rows="3"
                                                    style="overflow-wrap: anywhere; white-space: normal; height: 50px"
                                                    [ngModel]="item.description"
                                                    (input)="onDescriptionInputEvent($event, item)"
                                                    (blur)="onPointFieldBlur(item)"
                                                    class="inline-editor"
                                                    [readonly]="selectedPoint?.pointId !== item.pointId"
                                                    placeholder="Описание"
                                                    autocomplete="off"
                                                    autocorrect="off"
                                                    autocapitalize="off">
                                            </textarea>
                                        </div>
                                    </div>
                                </ng-template>
                            </p-orderList>
                        </div>
                    </p-tabpanel>
                </p-tabpanels>
            </p-tabs>
        </div>
    </div>
    <div class="map-column" style="position: relative;">
        <button *ngIf="filterPanelCollapsed" pButton type="button" 
                icon="pi pi-angle-right" 
                (click)="toggleFilterPanel()"
                class="p-button-sm p-button-text expand-btn"></button>
        <google-map 
            #googleMap
            width="100%" 
            height="100%"
            [center]="mapCenter || defaultCenter"
            [zoom]="mapZoom || 10"
            [options]="mapOptions"
            mapId="DEMO_MAP_ID"
            (mapClick)="onGoogleMapClick($event)">
            
            <map-advanced-marker
                *ngFor="let marker of mapMarkers"
                [position]="marker.position"
                [title]="marker.config?.title || 'Marker'"
                (mapClick)="onMarkerClick(marker)"
                (markerInitialized)="onMarkerInitialized(marker, $event)">
            </map-advanced-marker>
            
        </google-map>
    </div>
</div>
